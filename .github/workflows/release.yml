name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Push gem to RubyGems.org
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Run specs
        run: bundle exec rake spec

      - name: Set version from tag
        id: version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' is not a valid version tag (expected vMAJOR.MINOR.PATCH)." >&2
            exit 1
          fi

          ruby -e '
            path = "lib/semaphore_sms/version.rb"
            version = ARGV.fetch(0)
            contents = File.read(path)
            updated = contents.sub(/VERSION = '\''[^'\'']*'\''/, "VERSION = '\''#{version}'\''")
            abort "Failed to update VERSION in #{path}" if updated == contents && !contents.include?("'#{version}'")
            File.write(path, updated)
          ' "$version"

          # Path gem version is recorded in Gemfile.lock; refresh it after the bump.
          BUNDLE_FROZEN=false bundle lock

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing semaphore-sms-ruby ${version} from tag ${GITHUB_REF_NAME}"

      - name: Commit version for release build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/semaphore_sms/version.rb Gemfile.lock
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"

      - name: Check if version already published
        id: published
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          url="https://rubygems.org/api/v2/rubygems/semaphore-sms-ruby/versions/${VERSION}.json"
          if curl -sfL "$url" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "semaphore-sms-ruby ${VERSION} is already on RubyGems.org; skipping gem push."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push gem to RubyGems.org
        if: steps.published.outputs.exists != 'true'
        uses: rubygems/release-gem@v1

      - name: Sync version bump to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_PUSH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main

          ruby -e '
            path = "lib/semaphore_sms/version.rb"
            version = ARGV.fetch(0)
            contents = File.read(path)
            updated = contents.sub(/VERSION = '\''[^'\'']*'\''/, "VERSION = '\''#{version}'\''")
            abort "Failed to update VERSION in #{path}" if updated == contents && !contents.include?("'#{version}'")
            File.write(path, updated)
          ' "$VERSION"

          BUNDLE_FROZEN=false bundle lock

          git add lib/semaphore_sms/version.rb Gemfile.lock
          if git diff --cached --quiet; then
            echo "main already at ${VERSION}"
            exit 0
          fi

          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push "https://x-access-token:${GH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
